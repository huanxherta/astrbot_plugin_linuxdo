name: astrbot_plugin_linuxdo
display_name: LINUX DO 社区助手
description: 获取 linux.do 社区的热帖、活跃讨论及最新发布的话题。
version: 1.6.0
author: GeminiCLI
astrbot_version: ">=4.16"
repo: https://github.com/huanxherta/astrbot_plugin_linuxdo
support_platforms:
  - telegram
  - discord
  - qq_official

configurable: true
config_items:
  - name: top_limit
    type: number
    description: 每日热帖展示数量
    default: 15
  - name: new_limit
    type: number
    description: 最近活跃展示数量 (含回复)
    default: 30
  - name: fresh_limit
    type: number
    description: 最新发布展示数量 (纯新帖)
    default: 20
  - name: filter_pinned
    type: boolean
    description: 是否过滤置顶帖
    default: true
  - name: show_author
    type: boolean
    description: 是否显示最后回帖人
    default: true
