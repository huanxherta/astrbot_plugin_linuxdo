name: astrbot_plugin_linuxdo
display_name: LINUX DO 社区助手
description: 获取 linux.do 社区的热帖和搜索内容。
version: 1.3.7
author: GeminiCLI
astrbot_version: ">=4.16"
repo: https://github.com/huanxherta/astrbot_plugin_linuxdo
support_platforms:
  - telegram
  - discord
  - qq_official

# 针对 v4.22.1 的 WebUI 配置声明
config_schema:
  top_limit:
    type: int
    description: 每日热帖展示数量
    default: 15
  new_limit:
    type: int
    description: 最新讨论展示数量
    default: 20
  search_limit:
    type: int
    description: 搜索结果展示数量
    default: 10
  filter_pinned:
    type: bool
    description: 是否过滤置顶帖
    default: true
  show_author:
    type: bool
    description: 是否显示最后回帖人
    default: true
